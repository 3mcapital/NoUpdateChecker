name: Build iOS Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Create build directory
      run: mkdir -p build

    - name: Compile dylib (arm64 - iOS Device)
      run: |
        clang -dynamiclib \
          -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target-ios-version-min 12.0 \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework StoreKit \
          -o build/NoUpdateChecker-arm64.dylib \
          NoUpdateChecker.m \
          -undefined dynamic_lookup

    - name: Compile dylib (x86_64 - iOS Simulator)
      run: |
        clang -dynamiclib \
          -arch x86_64 \
          -isysroot $(xcrun --sdk iphonesimulator --show-sdk-path) \
          -target-ios-version-min 12.0 \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework StoreKit \
          -o build/NoUpdateChecker-x86_64.dylib \
          NoUpdateChecker.m \
          -undefined dynamic_lookup

    - name: Combine universal dylib (Optional - needs lipo)
      run: |
        if command -v lipo &> /dev/null; then
          lipo -create build/NoUpdateChecker-arm64.dylib build/NoUpdateChecker-x86_64.dylib -output build/NoUpdateChecker.dylib
          echo "✅ Universal dylib created"
        else
          cp build/NoUpdateChecker-arm64.dylib build/NoUpdateChecker.dylib
          echo "⚠️ Using arm64 dylib only"
        fi

    - name: List build output
      run: ls -lh build/

    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: NoUpdateChecker
        path: build/NoUpdateChecker*.dylib
        retention-days: 30

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/NoUpdateChecker*.dylib
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}