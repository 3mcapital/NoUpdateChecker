name: Build iOS Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Create build directory
      run: mkdir -p build

    - name: Compile dylib (arm64 - iOS Device)
      run: |
        clang -dynamiclib \
          -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target-ios-version-min 12.0 \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework StoreKit \
          -o build/NoUpdateChecker-arm64.dylib \
          NoUpdateChecker.m \
          -undefined dynamic_lookup

    - name: Compile dylib (x86_64 - iOS Simulator)
      run: |
        clang -dynamiclib \
          -arch x86_64 \
          -isysroot $(xcrun --sdk iphonesimulator --show-sdk-path) \
          -target-ios-version-min 12.0 \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework StoreKit \
          -o build/NoUpdateChecker-x86_64.dylib \
          NoUpdateChecker.m \
          -undefined dynamic_lookup

    - name: Combine universal dylib
      run: |
        lipo -create build/NoUpdateChecker-arm64.dylib build/NoUpdateChecker-x86_64.dylib -output build/NoUpdateChecker.dylib
        echo "✅ Universal dylib created"

    - name: List build output
      run: ls -lh build/

    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: NoUpdateChecker
        path: build/NoUpdateChecker*.dylib
        retention-days: 30